<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- White background -->
  <rect width="200" height="200" fill="white" rx="24"/>

  <!-- Birdie plug logo — recreated from brand asset -->
  <!-- Main body group, rotated ~-42deg around center -->
  <g transform="rotate(-42, 100, 100)">
    <!-- Outer oval ring (dark navy) -->
    <ellipse cx="100" cy="72" rx="42" ry="45" fill="#1c3a7c"/>
    <!-- Inner cutout (white) to form ring -->
    <ellipse cx="100" cy="72" rx="22" ry="24" fill="white"/>

    <!-- Body stem connecting ring to prongs -->
    <rect x="83" y="106" width="34" height="28" rx="6" fill="#1c3a7c"/>

    <!-- Left prong - cyan -->
    <rect x="76" y="130" width="18" height="38" rx="9" fill="#22d3ee"/>

    <!-- Right prong - medium blue -->
    <rect x="106" y="130" width="18" height="38" rx="9" fill="#5b8ef8"/>

    <!-- Wing / beak extension (top-right of oval) -->
    <ellipse cx="132" cy="48" rx="16" ry="13" fill="#1c3a7c"/>
    <!-- Inner cutout for wing -->
    <ellipse cx="130" cy="50" rx="6" ry="5" fill="white"/>
  </g>
</svg>
